<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta name="google" value="notranslate" />
    <title data-translate="get_your_offer">Get Your Offer!</title>
  </head>
  <body>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
      }

      html {
        font-size: 10px;
        line-height: 1.5;
      }

      @media screen and (max-width: 400px), (max-height: 400px) {
        html {
          font-size: calc(5px + 1vmin);
        }
      }

      body {
        background: linear-gradient(180deg, #120a29 0%, #3b1752 100%);
        color: #fff;
        display: flex;
        font-family:
          ui-sans-serif,
          system-ui,
          sans-serif,
          Apple Color Emoji,
          Segoe UI Emoji,
          Segoe UI Symbol,
          Noto Color Emoji;
        text-align: center;
        overflow: hidden;
      }

      a {
        text-decoration: none;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1,
      h3 {
        font-weight: 700;
      }

      h1 {
        font-size: 3.6rem;
        line-height: 4rem;
      }

      h3 {
        font-size: 2.4rem;
        line-height: 3.2rem;
      }

      img {
        display: block;
      }

      p {
        font-size: 2rem;
        line-height: 2.8rem;
      }

      /* ── Background image overlay ── */
      .dream-coin-bg {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }

      .dream-coin-bg img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.7;
        transition: transform 0.15s ease-out;
      }

      .dream-coin-bg img.is-animating {
        transform: scale(1.1);
      }

      /* ── Modal ── */
      .modal {
        align-items: center;
        display: flex;
        height: 100%;
        justify-content: center;
        padding: 1.2rem;
        position: absolute;
        width: 100%;
        z-index: 3;
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.2),
          rgba(0, 0, 0, 0.48),
          rgba(0, 0, 0, 0.9)
        );
        backdrop-filter: blur(32px);
        -webkit-backdrop-filter: blur(32px);
      }

      .modal__window {
        background: transparent;
        border-radius: 1.6rem;
        max-width: 38.4rem;
        padding: 2rem;
        width: 100%;
      }

      .modal__window__title {
        margin-bottom: 1.2rem;
        font-size: 3.6rem;
        font-weight: 500;
        line-height: 1.3;
        padding-bottom: 0.2rem;
        background: linear-gradient(90deg, #ffe448, #eea023);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .modal__window__text {
        color: rgba(255, 255, 255, 0.87);
        font-size: 2rem;
        font-weight: 400;
        line-height: 2.8rem;
        margin-bottom: 0;
      }

      .modal__window__text--secondary {
        margin-bottom: 3.2rem;
      }

      .modal__window__button {
        background: linear-gradient(180deg, #39e7ac, #21b875, #0ea070);
        border-radius: 0.8rem;
        color: #fff;
        display: block;
        font-size: 2.4rem;
        font-weight: 700;
        line-height: 3.2rem;
        padding: 1.2rem;
        text-transform: uppercase;
        letter-spacing: 0.2rem;
      }

      /* ── Game screen ── */
      .game {
        align-items: center;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 3.2rem;
        height: 100%;
        justify-content: center;
        padding: 2.8rem;
        padding-bottom: 10rem;
        position: relative;
        width: 100%;
        z-index: 1;
      }

      @media screen and (orientation: landscape) and (max-height: 550px) {
        .game {
          flex-direction: row;
        }
      }

      .game__header {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
        text-transform: uppercase;
      }

      .game__header__h1 {
        color: #fff;
        font-weight: 700;
        text-transform: uppercase;
      }

      .game__header__h3 {
        color: #d4d4d8;
        font-weight: 700;
        text-transform: uppercase;
      }

      .game__header__h3 strong {
        color: #fdc452;
        font-weight: 700;
      }

      .game__header__text {
        color: #fff;
        text-transform: initial;
      }

      .game__main {
        max-height: 35.7rem;
        max-width: 35.7rem;
        position: relative;
      }

      .game__main__image {
        transform: rotate(0);
        transition: transform 1s;
        max-height: 100%;
        max-width: 100%;
        width: 17rem;
      }

      .game__main__image-rotate-1 {
        transform: rotate(8deg);
      }

      .game__main__image-rotate-2 {
        transform: rotate(-8deg);
      }

      .game__main__image-hand {
        bottom: 0.6rem;
        height: 8rem;
        position: absolute;
        right: 0.1rem;
        width: 8rem;
        animation: cursorPulse 2s ease-in-out infinite;
      }

      @keyframes cursorPulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.2);
        }
      }

      .game__main__image-hand-animation-pulse {
        animation: cursorPulse 2s ease-in-out infinite;
      }

      .game__main__bonus-container {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
      }

      .game__main__bonus-value {
        animation: floatUpFade 3s ease-out forwards;
        color: #fff;
        font-size: 2.4rem;
        font-weight: 700;
        opacity: 1;
        position: absolute;
      }

      @keyframes floatUpFade {
        0% {
          transform: translateY(0);
          opacity: 1;
        }
        100% {
          transform: translateY(-40px);
          opacity: 0;
        }
      }

      .game__footer {
        bottom: 2.8rem;
        left: 2.8rem;
        position: absolute;
        right: 2.8rem;
      }

      /* Progress bar */
      .game__progress {
        align-items: center;
        background: linear-gradient(180deg, #39e7ac, #21b875, #0ea070);
        border-radius: 1.6rem;
        color: #fff;
        display: flex;
        height: 5.6rem;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      .game__progress__bar {
        bottom: 0;
        background-color: #febd2a;
        left: 0;
        position: absolute;
        top: 0;
        transition: width 1s linear;
        width: 0;
        z-index: 0;
      }

      .game__progress__text {
        font-size: 1.8rem;
        font-weight: 700;
        line-height: 2.8rem;
        position: relative;
        text-transform: uppercase;
        z-index: 1;
      }

      /* ── Final screen ── */
      .game-final-screen {
        align-items: center;
        background: linear-gradient(180deg, #120a29 0%, #3b1752 100%);
        bottom: 0;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        height: 100%;
        justify-content: center;
        left: 0;
        padding: 2.8rem;
        padding-bottom: 10rem;
        position: absolute;
        right: 0;
        top: 0;
        width: 100%;
        z-index: 2;
        overflow: hidden;
      }

      .game-final-screen__bg {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }

      .game-final-screen__bg img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.7;
      }

      .game-final-screen > .game__header,
      .game-final-screen > .game__main {
        position: relative;
        z-index: 1;
      }

      .game-final-screen > .game__footer {
        position: absolute;
        bottom: 2.8rem;
        left: 2.8rem;
        right: 2.8rem;
        z-index: 1;
      }

      @media screen and (orientation: landscape) and (max-height: 550px) {
        .game-final-screen {
          flex-direction: row;
        }
      }

      .game-final-screen .game__header {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.3rem;
        margin-top: 5rem;
      }

      .game-final-screen .game__header__h1 {
        font-size: 3rem;
        color: #fdc452;
        text-transform: uppercase;
        font-weight: 700;
      }

      .game-final-screen .game__header__text {
        color: #fff;
        font-size: 2rem;
        font-weight: 700;
        text-transform: none;
      }

      .game-final-screen .game__header__text strong {
        color: #fdc452;
        font-weight: 700;
      }

      .game-final-screen .game__header__h3 {
        color: #d4d4d8;
        text-transform: uppercase;
        font-weight: 700;
        font-size: 2rem;
      }

      .game-final-screen .game__main {
        margin-top: 1.3rem;
      }

      .game-final-screen .game__main__image {
        transform: scale(1);
        width: 17rem;
      }

      .game__button {
        background: linear-gradient(90deg, #39e7ac, #21b875, #0ea070, #c4c4c4);
        background-size: 200% 100%;
        animation: buttonGradientSweep 2s ease-in-out infinite;
        border-radius: 0.8rem;
        border: none;
        color: #fff;
        display: block;
        font-size: 2.4rem;
        font-weight: 700;
        line-height: 3.2rem;
        padding: 1.2rem;
        text-transform: uppercase;
        width: 100%;
        margin: auto;
        max-width: 42rem;
        cursor: pointer;
      }

      @keyframes buttonGradientSweep {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      /* ── Timer display ── */
      .dream-coin-timer {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        border: 1px solid rgba(255, 255, 255, 0.5);
        padding: 0.5rem 2.4rem;
        border-radius: 1.2rem;
        margin-top: 1.2rem;
      }

      .dream-coin-timer__label {
        font-size: 3.2rem;
        color: rgba(255, 255, 255, 0.6);
      }

      .dream-coin-timer__value {
        font-size: 3.2rem;
        font-weight: 700;
        color: #fff;
        min-width: 7rem;
      }

      /* ── Utilities ── */
      .blur {
        filter: blur(8px);
      }

      .hidden {
        display: none;
      }

      .visible {
        animation: makeVisible 1s ease forwards;
        display: flex;
        opacity: 0;
      }

      @keyframes makeVisible {
        0% {
          opacity: 0;
        }
        100% {
          opacity: 1;
        }
      }
    </style>

    <!-- Background image overlay (reacts to clicks in Design9) -->
    <div class="dream-coin-bg" id="dream-coin-bg">
      <img
        id="dream-coin-bg-img"
        src="./assets/blueMobileBack.webp"
        alt=""
        aria-hidden="true"
      />
    </div>

    <!-- Section Game Clicker -->
    <section class="game blur">
      <header class="game__header">
        <h1
          class="game__header__h1"
          data-translate="tap_to_start_earning"
        >
          Tap to start earning!
        </h1>
        <h3
          class="game__header__h3 game__progress__value-header"
          data-translate="you_have_some_seconds"
          data-translate-html
        >
          YOU HAVE 10 SECONDS
        </h3>
      </header>
      <main class="game__main">
        <img
          aria-hidden="true"
          alt="Coin"
          class="game__main__image"
          src="./assets/coin2.webp"
        />
        <img
          aria-hidden="true"
          alt="Cursor"
          class="game__main__image-hand game__main__image-hand-animation-pulse"
          src="./assets/cursor.webp"
        />
        <div class="game__main__bonus-container"></div>
      </main>
      <footer class="game__footer">
        <div class="game__progress hidden">
          <div class="game__progress__bar"></div>
          <div class="game__progress__text">
            <span data-translate="time_left">Time left:</span>
            &nbsp;
            <span class="game__progress__value">10</span>
          </div>
        </div>
      </footer>
    </section>

    <!-- Section Game Clicker: Final Screen -->
    <section class="game-final-screen hidden">
      <div class="game-final-screen__bg" aria-hidden="true">
        <img src="./assets/blueMobileBack.webp" alt="" />
      </div>
      <header class="game__header">
        <h1
          class="game__header__h1"
          data-translate="congratulations"
        >
          Congratulations
        </h1>
        <p
          class="game__header__text"
          data-translate="offer_expires_in"
          data-translate-html
        >
          Offer expires in 00:01:30
        </p>
        <h3
          class="game__header__h3"
          data-translate="click_and_get_your_offer"
        >
          Tap the button to unlock it!
        </h3>
      </header>
      <main class="game__main">
        <img
          aria-hidden="true"
          alt="Coin"
          class="game__main__image"
          src="./assets/coin2.webp"
        />
      </main>
      <footer class="game__footer">
        <button
          class="game__button"
          data-translate="get_special_offer"
        >
          Continue
        </button>
      </footer>
    </section>

    <!-- Section Modal -->
    <section class="modal">
      <div class="modal__window">
        <h3
          class="modal__window__title"
          data-translate="congratulations"
        >
          Congratulations!
        </h3>
        <p
          class="modal__window__text"
          data-translate="you_have_only_some_seconds"
        >
          You have only 10 seconds.
        </p>
        <p
          class="modal__window__text modal__window__text--secondary"
          data-translate="tap_to_start_earning"
        >
          Tap to start earning!
        </p>
        <a
          class="modal__window__button"
          href="#"
          data-translate="start"
        >
          Start
        </a>
      </div>
    </section>
  </body>
</html>
