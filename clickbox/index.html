</head>

<body>
    <!-- Section Background -->
    <section class="background">
        <div class="background__left">
            <div class="background__left__top">
                <img aria-hidden="true" alt="Cloud" class="background__cloud background__cloud-left-1" src="./assets/images/cloud-left-1.webp" data-cs="track">
            </div>
            <div class="background__left__bottom">
                <img aria-hidden="true" alt="Cloud" class="background__cloud background__cloud-left-2" src="./assets/images/cloud-left-2.webp" data-cs="track">
                <img aria-hidden="true" alt="Cloud" class="background__cloud background__cloud-left-3" src="./assets/images/cloud-left-3.webp" data-cs="track">
                <img aria-hidden="true" alt="Cloud" class="background__cloud background__cloud-left-4" src="./assets/images/cloud-left-4.webp" data-cs="track">
            </div>
        </div>
        <div class="background__right">
            <div class="background__right__top">
                <img aria-hidden="true" alt="Cloud" class="background__cloud background__cloud-right-1" src="./assets/images/cloud-right-1.webp" data-cs="track">
            </div>
            <div class="background__right__bottom">
                <img aria-hidden="true" alt="Cloud" class="background__cloud background__cloud-right-2" src="./assets/images/cloud-right-2.webp" data-cs="track">
                <img aria-hidden="true" alt="Cloud" class="background__cloud background__cloud-right-3" src="./assets/images/cloud-right-3.webp" data-cs="track">
            </div>
        </div>
        <div class="background__stars">
            <img aria-hidden="true" alt="Star" class="background__star background__star-1" src="./assets/images/star-five-pointed.webp" data-cs="track">
            <img aria-hidden="true" alt="Star" class="background__star background__star-2" src="./assets/images/star-five-pointed.webp" data-cs="track">
            <img aria-hidden="true" alt="Star" class="background__star background__star-3" src="./assets/images/star-five-pointed.webp" data-cs="track">
            <img aria-hidden="true" alt="Star" class="background__star background__star-4" src="./assets/images/star-five-pointed.webp" data-cs="track">
            <img aria-hidden="true" alt="Star" class="background__star background__star-5" src="./assets/images/star-five-pointed.webp" data-cs="track">
            <img aria-hidden="true" alt="Star" class="background__star background__star-6" src="./assets/images/star-four-pointed.webp" data-cs="track">
        </div>
    </section>

    <!-- Section Game Clicker -->
    <section class="game blur">
        <header class="game__header">
            <h1 class="game__header__h1" data-translate="tap_to_earn">
                Tap to earn your bonus
            </h1>
            <h3 class="game__header__h3 game__progress__value-header" data-translate="you_have_10_seconds">
                You have 10 seconds
            </h3>
        </header>
        <main class="game__main">
            <img aria-hidden="true" alt="Treasure chest" class="game__main__image" src="./assets/images/treasure-chest.webp" data-cs="track">
            <img aria-hidden="true" alt="Hand" class="game__main__image-hand game__main__image-hand-animation-pulse" src="./assets/images/hand.webp" data-cs="track">
            <div class="game__main__bonus-container"></div>
        </main>
        <footer class="game__footer">
            <div class="game__progress hidden">
                <div class="game__progress__bar"></div>
                <div class="game__progress__text">
                    <span data-translate="time_left"> Time left: </span>
                    &nbsp;
                    <span class="game__progress__value"> 10 </span>
                </div>
            </div>
        </footer>
    </section>

    <!-- Section Game Clicker: Final Screen -->
    <section class="game-final-screen hidden">
        <header class="game__header">
            <h1 class="game__header__h1" data-translate="congratulations">
                Congratulations
            </h1>
            <p class="game__header__text" data-translate="you_have_to_get_the_bonus">
                You have 00:01:30 to get the bonus!
            </p>
            <h3 class="game__header__h3" data-translate="click_and_get_your_offer">
                Click the button below to get your special offer.
            </h3>
        </header>
        <main class="game__main">
            <img aria-hidden="true" alt="Treasure chest" class="game__main__image" src="./assets/images/treasure-chest.webp" data-cs="track">
        </main>
        <footer class="game__footer">
            <button class="game__button" data-translate="get_special_offer">
                Get Special Offer
            </button>
        </footer>
    </section>

    <!-- Section Modal -->
    <section class="modal">
        <div class="modal__window">
            <h3 class="modal__window__title" data-translate="congratulations">
                Congratulations!
            </h3>
            <p class="modal__window__text" data-translate="you_have_10_seconds_tap_to_earn">
                You have only 10 seconds. Tap to earn your bonus!
            </p>
            <a class="modal__window__button" href="#" data-translate="start">
                Start
            </a>
        </div>
    </section>
